name: DevSecOps Pipeline

on:
  workflow_dispatch:
    inputs:
      IMAGE_REPO:
        description: 'Docker repository (e.g., username/juice-shop)'
        required: true

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      IMAGE_URI: ${{ github.event.inputs.IMAGE_REPO }}:${GITHUB_SHA}  # <-- High-scope dynamic image URI
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # -------------------------
      # 1️⃣ SAST with SonarQube
      # -------------------------
      - name: SonarQube Scan
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: SonarSource/sonarqube-scan-action@v4
        with:
          args: >
            -Dsonar.projectKey=Juice-Shop
            -Dsonar.projectName=JuiceShop
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # -------------------------
      # 2️⃣ Dependency Scan (Snyk)
      # -------------------------
      - name: Snyk Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # -------------------------
      # 3️⃣ Build & Push Docker Image (Docker Hub)
      # -------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        run: |
          echo "Building Docker image $IMAGE_URI"
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

      # -------------------------
      # 4️⃣ Container Scan (Trivy)
      # -------------------------
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: $IMAGE_URI

      # -------------------------
      # 5️⃣ Deploy to EKS (ClusterIP)
      # -------------------------
      - name: Configure kubectl
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: <your-region>

      - name: Deploy to EKS
        run: |
          # Apply deployment (placeholder image)
          kubectl apply -f k8s/juice-shop-deployment.yaml
          # Update deployment container with dynamic IMAGE_URI
          kubectl set image deployment/juice-shop juice-shop=$IMAGE_URI -n ribesh

      # -------------------------
      # 6️⃣ DAST Scan via Port-Forward
      # -------------------------
      - name: Port-forward Juice Shop
        run: |
          kubectl port-forward svc/juice-shop-service -n ribesh 3000:80 &
          sleep 5

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.6.0
        with:
          target: 'http://localhost:3000'